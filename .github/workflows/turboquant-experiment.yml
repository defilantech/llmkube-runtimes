# EXPERIMENT workflow, deliberately separate from the gated production build
# (build.yml). Builds the third-party TurboQuant fork for Vulkan and publishes
# an experiment-tagged image for hardware benchmarking only. No Tier-1/Tier-2
# gate, no promotion, never consumed by the operator.
name: turboquant-experiment

on:
  push:
    paths:
      - 'vulkan-turboquant/**'
      - '.github/workflows/turboquant-experiment.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: turboquant-experiment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/defilantech/llmkube-llama-vulkan-turboquant
      LOCAL: ghcr.io/defilantech/llmkube-llama-vulkan-turboquant:ci-${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      # vulkan-shaders-gen is memory-heavy on a cache-miss; give the build swap
      # headroom (same as the production build).
      - name: Add swap headroom
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true
          sudo fallocate -l 12G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - uses: docker/setup-buildx-action@v3

      - name: Build TurboQuant Vulkan image
        uses: docker/build-push-action@v6
        with:
          context: vulkan-turboquant
          target: tools
          load: true
          tags: ${{ env.LOCAL }}
          cache-from: type=gha,scope=turboquant-vulkan
          cache-to: type=gha,mode=max,scope=turboquant-vulkan

      - name: Smoke (Vulkan backend loads; bench + perplexity launch)
        run: |
          echo "== fork commit =="
          docker run --rm --entrypoint cat "${LOCAL}" /app/TURBO_SHA || true
          echo "== llama-server --list-devices =="
          out="$(docker run --rm --entrypoint /app/llama-server "${LOCAL}" --list-devices 2>&1)"; echo "${out}"
          echo "${out}" | grep -qiE 'symbol lookup error|failed to load|undefined symbol' && { echo "FAIL: backend load error"; exit 1; } || true
          docker run --rm --entrypoint /app/llama-bench "${LOCAL}" --help >/dev/null && echo "llama-bench OK"
          docker run --rm --entrypoint /app/llama-perplexity "${LOCAL}" --help >/dev/null 2>&1 && echo "llama-perplexity OK" || echo "llama-perplexity present (help exit nonzero, tolerated)"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push experiment image
        run: |
          EXP="${IMAGE}:experiment-${GITHUB_SHA}"
          docker tag "${LOCAL}" "${EXP}"
          docker push "${EXP}"
          echo "Pushed ${EXP}"
